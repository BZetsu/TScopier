# Railway template for TSCopier worker (one service per role/shard).
# Copy env from docs/worker-deployment.md. Listener shards: numReplicas = 1 only.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 15
restartPolicyType = "ON_FAILURE"
# Listener: set numReplicas = 1 in Railway UI (do not scale horizontally per shard).
numReplicas = 1
