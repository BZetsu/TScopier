name: Worker CI

on:
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/worker-ci.yml"
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - ".github/workflows/worker-ci.yml"

jobs:
  worker-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worker/package.json

      - name: Install worker dependencies
        run: npm install --prefix worker

      - name: Typecheck
        run: npm run build --prefix worker

      - name: Run worker tests
        run: npm test --prefix worker
